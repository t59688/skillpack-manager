<!-- Architecture Component -->
<section id="architecture" class="section">
  <div class="container">
    <div class="text-center mb-16" data-animate>
      <h2>Architecture</h2>
      <p class="mx-auto">Local-first design with extensible adapters for any distribution method.</p>
    </div>
    <div class="max-w-3xl mx-auto" data-animate>
      <!-- Pack Layer -->
      <div class="component-arch-layer bg-gradient-to-r from-primary-50 to-blue-50 border border-primary-100 w-full mb-6">
        <div class="component-arch-layer__header">
          <div class="component-arch-layer__icon bg-primary-100">
            <svg class="text-primary-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
          </div>
          <h3 class="component-arch-layer__title font-semibold text-primary-900">Skill Pack</h3>
        </div>
        <div class="component-arch-layer__items">
          <div class="bg-white/70 rounded-lg px-3 py-2 text-sm">skillpack.yaml</div>
          <div class="bg-white/70 rounded-lg px-3 py-2 text-sm">skills/**</div>
          <div class="bg-white/70 rounded-lg px-3 py-2 text-sm">shared/**</div>
          <div class="bg-white/70 rounded-lg px-3 py-2 text-sm">.skillpack</div>
        </div>
      </div>
      <!-- Arrow Down -->
      <div class="flex justify-center mb-6">
        <svg class="w-6 h-12 text-surface-400" fill="none" viewBox="0 0 24 48" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v36m-8-8 8 8 8-8"/>
        </svg>
      </div>
      <!-- CLI Layer -->
      <div class="component-arch-layer bg-gradient-to-r from-surface-50 to-surface-100 border border-surface-200 w-full mb-6">
        <div class="component-arch-layer__header">
          <div class="component-arch-layer__icon bg-surface-200">
            <svg class="text-surface-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 7.5l3 2.25-3 2.25m4.5 0h3m-9 8.25h13.5A2.25 2.25 0 0021 18V6a2.25 2.25 0 00-2.25-2.25H5.25A2.25 2.25 0 003 6v12a2.25 2.25 0 002.25 2.25z"/>
          </div>
          <h3 class="component-arch-layer__title font-semibold text-surface-900">CLI Commands</h3>
        </div>
        <div class="component-arch-layer__items component-arch-layer__items--tags">
          <span class="px-3 py-1.5 rounded-lg bg-white border border-surface-200 text-sm font-mono">scan</span>
          <span class="px-3 py-1.5 rounded-lg bg-white border border-surface-200 text-sm font-mono">create</span>
          <span class="px-3 py-1.5 rounded-lg bg-white border border-surface-200 text-sm font-mono">pack</span>
          <span class="px-3 py-1.5 rounded-lg bg-white border border-surface-200 text-sm font-mono">publish</span>
          <span class="px-3 py-1.5 rounded-lg bg-white border border-surface-200 text-sm font-mono">install</span>
          <span class="px-3 py-1.5 rounded-lg bg-white border border-surface-200 text-sm font-mono">audit</span>
          <span class="px-3 py-1.5 rounded-lg bg-white border border-surface-200 text-sm font-mono">diff</span>
          <span class="px-3 py-1.5 rounded-lg bg-white border border-surface-200 text-sm font-mono">sync</span>
        </div>
      </div>
      <!-- Arrow Down -->
      <div class="flex justify-center mb-6">
        <svg class="w-6 h-12 text-surface-400" fill="none" viewBox="0 0 24 48" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v36m-8-8 8 8 8-8"/>
        </svg>
      </div>
      <!-- Adapter Layer -->
      <div class="component-arch-layer bg-gradient-to-r from-emerald-50 to-teal-50 border border-emerald-100 w-full">
        <div class="component-arch-layer__header">
          <div class="component-arch-layer__icon bg-emerald-100">
            <svg class="text-emerald-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.19 8.688a4.5 4.5 0 011.242 7.244l-4.5 4.5a4.5 4.5 0 01-6.364-6.364l1.757-1.757m9.86-2.02a4.5 4.5 0 00-1.242-7.244l-4.5-4.5a4.5 4.5 0 00-6.364 6.364L4.34 8.68"/>
          </div>
          <h3 class="component-arch-layer__title font-semibold text-emerald-900">Target Adapters</h3>
        </div>
        <div class="component-arch-layer__items component-arch-layer__items--tags">
          <span class="px-3 py-1.5 rounded-lg bg-white border border-emerald-200 text-sm">Claude</span>
          <span class="px-3 py-1.5 rounded-lg bg-white border border-emerald-200 text-sm">Cursor</span>
          <span class="px-3 py-1.5 rounded-lg bg-white border border-emerald-200 text-sm">Codex</span>
          <span class="px-3 py-1.5 rounded-lg bg-white border border-emerald-200 text-sm">Windsurf</span>
          <span class="px-3 py-1.5 rounded-lg bg-white border border-emerald-200 text-sm">GitHub Release</span>
          <span class="px-3 py-1.5 rounded-lg bg-white border border-emerald-200 text-sm">Local</span>
        </div>
      </div>
    </div>
  </div>
</section>
